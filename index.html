<!DOCTYPE html>\n<html lang="hu">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Vocabulary Quiz</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background-color: #f4f4f4;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n        }\n        .quiz {\n            background: white;\n            padding: 20px;\n            border-radius: 5px;\n            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);\n        }\n        .question {\n            font-size: 1.2em;\n            margin-bottom: 10px;\n        }\n        button {\n            margin-top: 10px;\n        }\n    </style>\n</head>\n<body>\n    <div class="quiz">\n        <div class="question" id="question">Kérlek válaszd ki a megfelelő magyar szót a családi szavakhoz!</div>\n        <button onclick="checkAnswer('anya')">Anya</button>\n        <button onclick="checkAnswer('apa')">Apa</button>\n        <button onclick="checkAnswer('fiú')">Fiú</button>\n        <button onclick="checkAnswer('lány')">Lány</button>\n        <div id="result"></div>\n    </div>\n    <script>\n        function checkAnswer(answer) {\n            const resultDiv = document.getElementById('result');\n            if (answer === 'anya') {\n                resultDiv.textContent = 'Helyes válasz!';\n                resultDiv.style.color = 'green';\n            } else {\n                resultDiv.textContent = 'Hibás válasz, próbáld újra!';\n                resultDiv.style.color = 'red';\n            }\n        }\n    </script>\n</body>\n</html>
