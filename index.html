<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocabulary Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      max-width: 500px;
      width: 90%;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .question {
      font-size: 18px;
      margin-bottom: 20px;
      color: #555;
    }

    .options {
      display: flex;
      flex-direction: column;
    }

    .option {
      padding: 12px;
      margin: 8px 0;
      border: 2px solid #ddd;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
      background: #f9f9f9;
    }

    .option:hover {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .option.correct {
      background: #4caf50;
      color: white;
      border-color: #4caf50;
    }

    .option.incorrect {
      background: #f44336;
      color: white;
      border-color: #f44336;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s;
    }

    button:hover {
      background: #764ba2;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .score {
      text-align: center;
      margin-top: 20px;
      font-size: 18px;
      color: #333;
    }

    .quiz-complete {
      text-align: center;
      padding: 20px;
    }

    .quiz-complete h2 {
      color: #667eea;
    }

    .quiz-complete p {
      font-size: 24px;
      color: #764ba2;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hungarian Vocabulary Quiz</h1>
    <div id="quiz"></div>
  </div>

  <script>
    const quizData = [
      { question: "Jó reggelt! (Good morning!)", options: ["Goodbye", "Good morning", "Good night", "Hello"], correct: 1 },
      { question: "Viszontlátásra! (Goodbye!)", options: ["Hello", "Good evening", "Goodbye", "Good night"], correct: 2 },
      { question: "Köszi! (Thanks!)", options: ["Sorry", "Thanks", "Please", "No"], correct: 1 },
      { question: "Igen (Yes)", options: ["No", "Yes", "Maybe", "Don't know"], correct: 1 },
      { question: "Nem (No)", options: ["Yes", "No", "Maybe", "Don't know"], correct: 1 },
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function displayQuestion() {
      const quizContainer = document.getElementById("quiz");
      const question = quizData[currentQuestion];

      if (currentQuestion < quizData.length) {
        let html = `<div class="question">${question.question}</div><div class="options">`;
        question.options.forEach((option, index) => {
          html += `<div class="option" onclick="selectOption(${index})">${option}</div>`;
        });
        html += `</div>
          <button onclick="nextQuestion()" ${!answered ? "disabled" : ""}>Next</button>
          <div class="score">Question ${currentQuestion + 1} of ${quizData.length}</div>`;

        quizContainer.innerHTML = html;
      } else {
        quizContainer.innerHTML = `<div class="quiz-complete">
            <h2>Quiz Complete!</h2>
            <p>Your Score: ${score} / ${quizData.length}</p>
            <button onclick="restartQuiz()">Restart</button>
          </div>`;
      }
    }

    function selectOption(index) {
      if (answered) return;
      answered = true;

      const question = quizData[currentQuestion];
      const options = document.querySelectorAll(".option");

      options[index].classList.add(index === question.correct ? "correct" : "incorrect");
      options[question.correct].classList.add("correct");

      if (index === question.correct) score++;

      document.querySelector("button").disabled = false;
    }

    function nextQuestion() {
      currentQuestion++;
      answered = false;
      displayQuestion();
    }

    function restartQuiz() {
      currentQuestion = 0;
      score = 0;
      answered = false;
      displayQuestion();
    }

    displayQuestion();
  </script>
</body>
</html>
